{{- with .Values.smf }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "free5gc-smf.fullname" $ }}-configmap
  labels:
    app: {{ $.Values.global.projectName }}
data:
  smfcfg.yaml: |
    info:
      version: 1.0.7
      description: SMF initial local configuration

    configuration:
      serviceNameList:
        {{- .configuration.serviceNameList | nindent 8 }}

      sbi:
        scheme: {{ $.Values.global.sbi.scheme }}
        registerIPv4: {{ include "free5gc-smf.fullname" $ }}-service # IP used to register to NRF
        bindingIPv4: 0.0.0.0  # IP used to bind the service
        port: {{ .service.port }}
        tls:
          key: ./cert/smf.key
          pem: ./cert/smf.pem
{{- if $.Values.smf.configuration.metrics.enable }}
      metrics: 
        enable: true
        scheme: {{ $.Values.smf.configuration.metrics.scheme }}
        bindingIPv4: 0.0.0.0  # IP used to bind the service
        port: {{ $.Values.smf.configuration.metrics.port }}
        namespace: {{ $.Values.smf.configuration.metrics.namespace }}
        tls:
          key: ./cert/smf.key
          pem: ./cert/smf.pem
{{- end }}
      nrfUri: {{ $.Values.global.sbi.scheme }}://{{ $.Values.global.nrf.service.name }}:{{ $.Values.global.nrf.service.port }}
      nrfCertPem: ./cert/nrf.pem # NRF Certificate
      {{- .configuration.urrConfiguration | nindent 6 }}
      pfcp:
        # Cross-UC: listenAddr binds all interfaces (incl. pod net); nodeID/
        # externalAddr are the SMF's fabric-reachable PFCP address so the edge
        # UPF (in another UC) can reply. Each falls back to n4if.ipAddress for
        # the classic single-UC case.
        nodeID: {{ $.Values.global.smf.n4if.nodeID | default $.Values.global.smf.n4if.ipAddress }}
        listenAddr: {{ $.Values.global.smf.n4if.listenAddr | default $.Values.global.smf.n4if.ipAddress }}
        externalAddr: {{ $.Values.global.smf.n4if.externalAddr | default $.Values.global.smf.n4if.nodeID | default $.Values.global.smf.n4if.ipAddress }}

      {{- .configuration.configuration | nindent 6 }}

    logger:
      {{- toYaml .configuration.logger | nindent 6 }}


  uerouting.yaml: |
    info:
      version: 1.0.7
      description: Routing information for UE
    ueRoutingInfo:
      {{- .configuration.ueRoutingInfo | nindent 6 }}

{{- end }}
